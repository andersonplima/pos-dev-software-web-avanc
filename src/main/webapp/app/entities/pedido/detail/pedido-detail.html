<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (pedido(); as pedidoRef) {
      <div>
        <h2 data-cy="pedidoDetailsHeading"><span jhiTranslate="jhipsterapp1App.pedido.detail.title">Pedido</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">Código</span></dt>
          <dd>
            <span>{{ pedidoRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.pedido.dataPedido">Data Pedido</span></dt>
          <dd>
            <span>{{ pedidoRef.dataPedido | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.pedido.valorPedido">Valor Pedido</span></dt>
          <dd>
            <span>{{ pedidoRef.valorPedido }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Voltar</span>
        </button>

        <button type="button" [routerLink]="['/pedido', pedidoRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
