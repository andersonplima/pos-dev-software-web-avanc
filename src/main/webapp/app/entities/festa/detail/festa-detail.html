<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (festa(); as festaRef) {
      <div>
        <h2 data-cy="festaDetailsHeading"><span jhiTranslate="jhipsterapp1App.festa.detail.title">Festa</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">Código</span></dt>
          <dd>
            <span>{{ festaRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.festa.nome">Nome</span></dt>
          <dd>
            <span>{{ festaRef.nome }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.festa.tema">Tema</span></dt>
          <dd>
            <span>{{ festaRef.tema }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.festa.valor">Valor</span></dt>
          <dd>
            <span>{{ festaRef.valor }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.festa.tipoFesta">Tipo Festa</span></dt>
          <dd>
            @if (festa()!.tipoFesta) {
              <div>
                <a [routerLink]="['/tipo-festa', festa()!.tipoFesta?.id, 'view']">{{ festaRef.tipoFesta?.nome }}</a>
              </div>
            }
          </dd>
          <dt><span jhiTranslate="jhipsterapp1App.festa.cliente">Cliente</span></dt>
          <dd>
            @if (festa()!.cliente) {
              <div>
                <a [routerLink]="['/cliente', festa()!.cliente?.id, 'view']">{{ festaRef.cliente?.cpf }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Voltar</span>
        </button>

        <button type="button" [routerLink]="['/festa', festaRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
