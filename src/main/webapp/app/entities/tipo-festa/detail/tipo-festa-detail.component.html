<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="tipoFesta">
      <h2 data-cy="tipoFestaDetailsHeading"><span jhiTranslate="jhipsterapp1App.tipoFesta.detail.title">Tipo Festa</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">Código</span></dt>
        <dd>
          <span>{{ tipoFesta.id }}</span>
        </dd>
        <dt><span jhiTranslate="jhipsterapp1App.tipoFesta.nome">Nome</span></dt>
        <dd>
          <span>{{ tipoFesta.nome }}</span>
        </dd>
        <dt><span jhiTranslate="jhipsterapp1App.tipoFesta.descricao">Descricao</span></dt>
        <dd>
          <span>{{ tipoFesta.descricao }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Voltar</span>
      </button>

      <button type="button" [routerLink]="['/tipo-festa', tipoFesta.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
      </button>
    </div>
  </div>
</div>
