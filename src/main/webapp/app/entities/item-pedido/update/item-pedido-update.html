<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-item-pedido-heading"
        data-cy="ItemPedidoCreateUpdateHeading"
        jhiTranslate="jhipsterapp1App.itemPedido.home.createOrEditLabel"
      >
        Criar ou editar Item Pedido
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="global.field.id">Código</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        @let nomeItemRef = editForm.get('nomeItem')!;
        <div class="mb-3">
          <label class="form-label" for="field_nomeItem" jhiTranslate="jhipsterapp1App.itemPedido.nomeItem">Nome Item</label>
          <input type="text" class="form-control" name="nomeItem" id="field_nomeItem" data-cy="nomeItem" formControlName="nomeItem" />
          @if (nomeItemRef.invalid && (nomeItemRef.dirty || nomeItemRef.touched)) {
            <div>
              @if (editForm.get('nomeItem')?.errors?.required) {
                <small class="form-text text-danger" jhiTranslate="entity.validation.required">O campo é obrigatório.</small>
              }
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_valorItem" jhiTranslate="jhipsterapp1App.itemPedido.valorItem">Valor Item</label>
          <input type="number" class="form-control" name="valorItem" id="field_valorItem" data-cy="valorItem" formControlName="valorItem" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_pedido" jhiTranslate="jhipsterapp1App.itemPedido.pedido">Pedido</label>
          <select
            class="form-control"
            id="field_pedido"
            data-cy="pedido"
            name="pedido"
            formControlName="pedido"
            [compareWith]="comparePedido"
          >
            <option [ngValue]="null"></option>
            @for (pedidoOption of pedidosSharedCollection(); track $index) {
              <option [ngValue]="pedidoOption">{{ pedidoOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving()"
          class="btn btn-primary"
        >
          <fa-icon icon="save" />&nbsp;<span jhiTranslate="entity.action.save">Salvar</span>
        </button>
      </div>
    </form>
  </div>
</div>
