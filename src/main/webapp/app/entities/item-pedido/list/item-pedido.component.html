<div>
  <h2 id="page-heading" data-cy="ItemPedidoHeading">
    <span jhiTranslate="jhipsterapp1App.itemPedido.home.title">Item Pedidos</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="jhipsterapp1App.itemPedido.home.refreshListLabel">Atualizar lista</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-item-pedido"
        [routerLink]="['/item-pedido/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="jhipsterapp1App.itemPedido.home.createLabel"> Criar novo Item Pedido </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="itemPedidos?.length === 0">
    <span jhiTranslate="jhipsterapp1App.itemPedido.home.notFound">Nenhum Item Pedido encontrado</span>
  </div>

  <div class="table-responsive table-entities" id="entities" *ngIf="itemPedidos && itemPedidos.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="navigateToWithComponentValues()">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span jhiTranslate="global.field.id">Código</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="nomeItem">
            <div class="d-flex">
              <span jhiTranslate="jhipsterapp1App.itemPedido.nomeItem">Nome Item</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="valorItem">
            <div class="d-flex">
              <span jhiTranslate="jhipsterapp1App.itemPedido.valorItem">Valor Item</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="pedido.id">
            <div class="d-flex">
              <span jhiTranslate="jhipsterapp1App.itemPedido.pedido">Pedido</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody
        infinite-scroll
        (scrolled)="loadPage(page + 1)"
        [infiniteScrollDisabled]="page - 1 >= links['last']"
        [infiniteScrollDistance]="0"
      >
        <tr *ngFor="let itemPedido of itemPedidos; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/item-pedido', itemPedido.id, 'view']">{{ itemPedido.id }}</a>
          </td>
          <td>{{ itemPedido.nomeItem }}</td>
          <td>{{ itemPedido.valorItem }}</td>
          <td>
            <div *ngIf="itemPedido.pedido">
              <a [routerLink]="['/pedido', itemPedido.pedido.id, 'view']">{{ itemPedido.pedido.id }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/item-pedido', itemPedido.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">Visualizar</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/item-pedido', itemPedido.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Editar</span>
              </button>

              <button type="submit" (click)="delete(itemPedido)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Excluir</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
