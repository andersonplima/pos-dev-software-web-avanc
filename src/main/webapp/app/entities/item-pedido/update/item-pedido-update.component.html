<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-item-pedido-heading"
        data-cy="ItemPedidoCreateUpdateHeading"
        jhiTranslate="jhipsterapp1App.itemPedido.home.createOrEditLabel"
      >
        Criar ou editar Item Pedido
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="jhipsterapp1App.itemPedido.nomeItem" for="field_nomeItem">Nome Item</label>
          <input type="text" class="form-control" name="nomeItem" id="field_nomeItem" data-cy="nomeItem" formControlName="nomeItem" />
          <div *ngIf="editForm.get('nomeItem')!.invalid && (editForm.get('nomeItem')!.dirty || editForm.get('nomeItem')!.touched)">
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('nomeItem')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              O campo é obrigatório.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="jhipsterapp1App.itemPedido.valorItem" for="field_valorItem">Valor Item</label>
          <input type="number" class="form-control" name="valorItem" id="field_valorItem" data-cy="valorItem" formControlName="valorItem" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="jhipsterapp1App.itemPedido.pedido" for="field_pedido">Pedido</label>
          <select
            class="form-control"
            id="field_pedido"
            data-cy="pedido"
            name="pedido"
            formControlName="pedido"
            [compareWith]="comparePedido"
          >
            <option [ngValue]="null"></option>
            <option [ngValue]="pedidoOption" *ngFor="let pedidoOption of pedidosSharedCollection">{{ pedidoOption.id }}</option>
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Salvar</span>
        </button>
      </div>
    </form>
  </div>
</div>
